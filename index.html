<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Proyectos</title>
    <!-- Cargamos los iconos de FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #000; /* Fondo negro */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 40px; font-weight: 300; }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
            max-width: 450px;
        }
        .btn {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            text-decoration: none;
            color: white;
            background-color: #1a1a1a; /* Gris muy oscuro */
            border: 1px solid #333;
            border-radius: 12px;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .btn i {
            margin-right: 15px;
            font-size: 1.5rem;
            color: #007bff; /* Color del icono */
        }
        .btn:hover {
            background-color: #333;
            border-color: #555;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <h1>Mis Aplicaciones</h1>

    <div class="container">
        <!-- SE CORRIGIÓ LA DIRECCIÓN DEL NUEVO PROYECTO DE ANÁLISIS BVC -->
        <a href="https://analisisbvcc.streamlit.app/" class="btn" target="_blank" rel="noopener noreferrer">
            <i class="fas fa-dollar-sign"></i> Analisis
        </a>
        
        <a href="https://jonathanirigoyeninversiones-prog.github.io/traderview/" class="btn" target="_blank" rel="noopener noreferrer">
            <i class="fas fa-chart-line"></i> TraderView
        </a>
        
        <a href="https://jonathanirigoyeninversiones-prog.github.io/bcv-tracker-2026/" class="btn" target="_blank" rel="noopener noreferrer">
            <i class="fas fa-dollar-sign"></i> BCV Tracker 2026
        </a>
        
        <a href="https://jonathanirigoyeninversiones-prog.github.io/spot-futuro-dca/" class="btn" target="_blank" rel="noopener noreferrer">
            <i class="fas fa-gamepad"></i> Spot Futuro Dca
        </a>

        <a href="https://jonathanirigoyeninversiones-prog.github.io/Juegos-Finanzas/" class="btn" target="_blank" rel="noopener noreferrer">
            <i class="fas fa-gamepad"></i> Juego Finanzas 
        </a>
        
    </div>

</body>
</html>
